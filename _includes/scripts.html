<!-- Visitor IP Logging via Cloudflare Workers -->
<script>
(function() {
  // ==========================================
  // 配置：替换为你的 Cloudflare Worker URL
  // 部署步骤：
  // 1. 登录 Cloudflare Dashboard → Workers 和 Pages
  // 2. 创建 Service Worker，粘贴后端代码（见下方说明）
  // 3. 绑定 KV 命名空间（变量名：VISITOR_LOGS）
  // 4. 部署并复制 Worker URL，替换到下面这行：
  var WORKER_URL = 'https://lezheng-visitor-log.owenlele.workers.dev';
  // ==========================================

  // 如果未配置 URL，则不记录
  if (!WORKER_URL || WORKER_URL.indexOf('your-worker') !== -1) return;

  // 防止同一 session 内重复记录
  if (sessionStorage.getItem('__ipLogged')) return;
  sessionStorage.setItem('__ipLogged', '1');

  // 发送访问信息到 Cloudflare Worker
  // Worker 会自动从 HTTP 头获取访问者真实 IP
  var page = window.location.href;
  var ua = navigator.userAgent;

  fetch(WORKER_URL + '?page=' + encodeURIComponent(page) + '&ua=' + encodeURIComponent(ua), {
    method: 'GET',
    mode: 'no-cors'
  }).catch(function(err) {
    console.log('Visitor logging failed:', err);
  });
})();
</script>
